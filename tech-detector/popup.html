<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🔍 Tech Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      width: 300px;
      background: #0f172a;
      color: #e2e8f0;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.75;
      margin-left: auto;
    }

    /* ── Container ────────────────────────────────── */
    .container { padding: 10px 10px 14px; }

    /* ── Section ──────────────────────────────────── */
    .section { margin-bottom: 10px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #94a3b8;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
      padding-left: 2px;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(30, 58, 95, 0.13);
    }

    /* ── Item ─────────────────────────────────────── */
    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.25);
      transition: background 0.15s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #263548; }
    .item-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      flex-shrink: 0;
    }
    .text { font-size: 13px; color: #cbd5e1; }

    /* ── Error ────────────────────────────────────── */
    .error-item { color: #f87171; font-size: 13px; padding: 10px; }

    /* ── Phishing banner ──────────────────────────── */
    .trusted {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      border: 1px solid transparent;
    }
    .trust-icon { font-size: 18px; flex-shrink: 0; }
    .trust-text { flex: 1; }

    .banner-danger   { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; }
    .banner-warn     { background: #431407; border-color: #7c2d12; color: #fdba74; }
    .banner-safe     { background: #052e16; border-color: #14532d; color: #86efac; }
    .banner-likely   { background: #1c1917; border-color: #44403c; color: #fcd34d; }
    .banner-unknown  { background: #1e293b; border-color: #334155; color: #94a3b8; }
    .banner-scanning {
      background: #1e293b;
      border-color: #334155;
      color: #94a3b8;
      animation: pulse 1.6s ease-in-out infinite;
    }

    /* ── Empty / loading state ────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px 16px;
      color: #64748b;
      font-size: 12px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── Animations ───────────────────────────────── */
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── Scrollbar ────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="header">
    🔍 Tech Detector
    <span class="header-sub">v1.2 · Firefox</span>
  </div>

  <div class="container">
    <div id="results">
      <div class="empty-state">
        <div class="spinner"></div>
        <p>Scanning website…</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
